services:
  app:
    build: .
    ports: ["3000:3000"]
    environment:
      - DATABASE_URL=postgresql://rgl:rgl@db:5432/rgl?schema=public
      - JWT_SECRET=troque-este-segredo-em-producao-min-32-chars
    depends_on: [db]

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=rgl
      - POSTGRES_PASSWORD=rgl
      - POSTGRES_DB=rgl
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

volumes:
  pgdata:
